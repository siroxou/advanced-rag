name: advanced-rag

# Lean local infra. Gemma 4 runs on the host via Ollama (Apple Metal), NOT in a
# container - Docker on macOS has no GPU passthrough. LangFuse uses the free cloud
# tier (set keys in .env); self-hosting it is documented in docs/runbook.md.
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: advanced-rag-db
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  pgdata:
