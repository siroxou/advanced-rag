{{- if .Values.vllm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-vllm
  labels:
    {{- include "advanced-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: vllm
    spec:
      nodeSelector:
        {{- toYaml .Values.vllm.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.vllm.tolerations | nindent 8 }}
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          args: ["--model", "{{ .Values.vllm.model }}", "--port", "{{ .Values.vllm.port }}"]
          ports:
            - containerPort: {{ .Values.vllm.port }}
          resources:
            {{- toYaml .Values.vllm.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-vllm
  labels:
    {{- include "advanced-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: vllm
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: vllm
  ports:
    - port: {{ .Values.vllm.port }}
      targetPort: {{ .Values.vllm.port }}
{{- end }}
